version: '3.8'
services:
  api-gateway:
    build: ./backend/api-gateway
    container_name: edumicro-gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:3001
      - COURSE_SERVICE_URL=http://course-service:3002
      - ASSIGNMENT_SERVICE_URL=http://assignment-service:3003
      - GRADE_SERVICE_URL=http://grade-service:3004
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
      - JWT_SECRET=${JWT_SECRET:-development-secret-key}
    depends_on:
      - user-service
      - course-service
      - assignment-service
      - grade-service
      - notification-service
    networks:
      - edumicro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    restart: unless-stopped

  user-service:
    build: ./backend/microservices/user-service
    container_name: edumicro-user-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - USER_SERVICE_PORT=3001
    volumes:
      - user-service-data:/app/data
    networks:
      - edumicro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  course-service:
    build: ./backend/microservices/course-service
    container_name: edumicro-course-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - COURSE_SERVICE_PORT=3002
    volumes:
      - course-service-data:/app/data
    networks:
      - edumicro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  assignment-service:
    build: ./backend/microservices/assignment-service
    container_name: edumicro-assignment-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - ASSIGNMENT_SERVICE_PORT=3003
    volumes:
      - assignment-service-data:/app/data
    networks:
      - edumicro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  grade-service:
    build: ./backend/microservices/grade-service
    container_name: edumicro-grade-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=production
      - GRADE_SERVICE_PORT=3004
    volumes:
      - grade-service-data:/app/data
    networks:
      - edumicro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  notification-service:
    build: ./backend/microservices/notification-service
    container_name: edumicro-notification-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - NOTIFICATION_SERVICE_PORT=3005
    volumes:
      - notification-service-data:/app/data
    networks:
      - edumicro-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: edumicro-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    networks:
      - edumicro-network
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  edumicro-network:
    driver: bridge

volumes:
  user-service-data:
  course-service-data:
  assignment-service-data:
  grade-service-data:
  notification-service-data:
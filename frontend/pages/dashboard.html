<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EduMicro</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dashboard-container { min-height: 100vh; padding: 6rem 2rem 2rem; max-width: 1200px; margin: 0 auto; }
        .dashboard-header { text-align: center; margin-bottom: 3rem; }
        .course-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .course-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 15px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.2); transition: transform 0.3s; }
        .course-card:hover { transform: translateY(-5px); }
        .course-card h3 { margin-bottom: 0.5rem; }
        .progress-bar { background: rgba(255,255,255,0.2); height: 8px; border-radius: 4px; margin: 1rem 0; overflow: hidden; }
        .progress-fill { background: var(--primary-color); height: 100%; border-radius: 4px; width: 0%; }
        .btn-enroll { background: var(--primary-color); color: white; border: none; padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">EduMicro</div>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="#" class="login-btn" onclick="authManager.logout()">Logout</a></li>
            </ul>
        </div>
    </nav>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>Welcome, <span id="userName">Student</span>!</h1>
            <p>Continue your learning journey</p>
        </div>
        <h2>Available Courses</h2>
        <div class="course-grid" id="courseGrid">
            <div class="course-card">
                <h3>Loading courses...</h3>
            </div>
        </div>
    </div>
    <script src="../js/particles.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = authManager.getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('userName').textContent = user.name || user.email;
            try {
                const response = await authManager.apiRequest('/courses');
                const courses = response.data.courses;
                const grid = document.getElementById('courseGrid');
                grid.innerHTML = courses.map(course => `
                    <div class="course-card">
                        <h3>${course.title}</h3>
                        <p>${course.description || ''}</p>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${Math.floor(Math.random()*100)}%"></div>
                        </div>
                        <button class="btn-enroll" onclick="enrollCourse(${course.id})">Enroll</button>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('courseGrid').innerHTML = '<div class="course-card"><h3>Could not load courses. Make sure the backend is running.</h3></div>';
            }
        });
        function enrollCourse(courseId) {
            alert('Enrollment functionality would be here. Course ID: ' + courseId);
        }
    </script>
</body>
</html>

name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
        service: [api-gateway, user-service, course-service, assignment-service, grade-service, notification-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Set service directory
        id: dir
        run: |
          if [ "${{ matrix.service }}" = "api-gateway" ]; then
            echo "path=backend/api-gateway" >> $GITHUB_OUTPUT
          else
            echo "path=backend/microservices/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: cd ${{ steps.dir.outputs.path }} && npm ci

      - name: Run tests (if any)
        run: cd ${{ steps.dir.outputs.path }} && npm test || true

  build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    strategy:
      matrix:
        service: [api-gateway, user-service, course-service, assignment-service, grade-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set Docker context path
        id: context
        run: |
          if [ "${{ matrix.service }}" = "api-gateway" ]; then
            echo "context=backend/api-gateway" >> $GITHUB_OUTPUT
          else
            echo "context=backend/microservices/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.context }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/edumicro-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/edumicro-${{ matrix.service }}:${{ github.sha }}

  deploy:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages
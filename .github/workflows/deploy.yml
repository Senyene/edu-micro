name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
        service: [api-gateway, user-service, course-service, assignment-service, grade-service, notification-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: |
          if [ -d "backend/${{ matrix.service }}" ]; then
            cd backend/${{ matrix.service }} && npm ci
          else
            echo "Skipping ${{ matrix.service }} – folder not found"
          fi
      - name: Run tests (if any)
        run: |
          if [ -d "backend/${{ matrix.service }}" ]; then
            cd backend/${{ matrix.service }} && npm test || true
          fi

  # Temporarily disabled – add Docker Hub secrets and remove `if: false` to enable
  build:
    if: false
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [api-gateway, user-service, course-service, assignment-service, grade-service, notification-service]
    steps:
      - uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/edumicro-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/edumicro-${{ matrix.service }}:${{ github.sha }}

  deploy:
    if: false
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend